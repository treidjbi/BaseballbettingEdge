<style>
  html, body { margin: 0; height: 100%; font-family: 'Inter', sans-serif; background: #f0eee9; color: #1a1a1a; }
  #root { width: 100%; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

const PHONE_W = 400, PHONE_H = 820;

function PhoneBezel({ src, initScript }) {
  return (
    <div style={{
      width: PHONE_W + 16, height: PHONE_H + 16,
      background: '#1a1a1a', borderRadius: 42, padding: 8,
      boxShadow: '0 20px 60px rgba(0,0,0,0.18), 0 4px 12px rgba(0,0,0,0.08)',
      position: 'relative',
    }}>
      <iframe
        src={src}
        onLoad={(e) => { if (initScript) { try { initScript(e.target); } catch {} } }}
        style={{
          width: PHONE_W, height: PHONE_H,
          border: 'none', borderRadius: 34, background: '#fff',
          display: 'block',
        }}
      />
    </div>
  );
}

function Callout({ n, title, desc, top, left, color = '#c6321f', pointTo = 'left' }) {
  return (
    <div style={{
      position: 'absolute', top, left,
      width: 260, zIndex: 10,
    }}>
      <div style={{
        display: 'flex', gap: 10, alignItems: 'flex-start',
      }}>
        <div style={{
          width: 24, height: 24, borderRadius: 12, flexShrink: 0,
          background: color, color: '#fff',
          display: 'grid', placeItems: 'center',
          fontSize: 12, fontWeight: 700, fontFamily: 'JetBrains Mono, monospace',
          boxShadow: '0 2px 6px rgba(0,0,0,0.15)',
        }}>{n}</div>
        <div style={{ paddingTop: 2 }}>
          <div style={{
            fontSize: 13, fontWeight: 600, color: '#1a1a1a',
            lineHeight: 1.25, marginBottom: 3,
          }}>{title}</div>
          <div style={{
            fontSize: 12, color: '#5a5448', lineHeight: 1.45,
          }}>{desc}</div>
        </div>
      </div>
    </div>
  );
}

function Pin({ n, top, left, color = '#c6321f' }) {
  return (
    <div style={{
      position: 'absolute', top, left, zIndex: 11,
      width: 22, height: 22, borderRadius: 11,
      background: color, color: '#fff',
      display: 'grid', placeItems: 'center',
      fontSize: 11, fontWeight: 700, fontFamily: 'JetBrains Mono, monospace',
      boxShadow: '0 2px 8px rgba(0,0,0,0.25), 0 0 0 3px rgba(255,255,255,0.8)',
      transform: 'translate(-50%, -50%)',
    }}>{n}</div>
  );
}

function Root() {
  const currentIssues = [
    { n: 1, title: 'Weak verdict hierarchy', desc: 'FIRE pills sit small in the corner; PASS cards occupy full weight. A user scanning for action has to read every card.' },
    { n: 2, title: 'Dated chrome', desc: 'Barber-stripe card header + cream paper body + stadium-dark nav feels like three different products stapled together.' },
    { n: 3, title: '3-column stat block buries the pick', desc: 'Line / Proj K / EV get equal visual weight, but EV and direction are the only things that drive a bet decision.' },
    { n: 4, title: 'Reasoning is hidden', desc: 'OPP K% badge shows "+7% vs avg" but you can\'t tell why the model likes this side without tapping into nothing — there is no detail view.' },
    { n: 5, title: 'Date dropdown is slow', desc: 'Changing days = click, scroll, find date. No sense of yesterday\'s result before you switch.' },
    { n: 6, title: 'Steam hides in Watchlist tab', desc: 'The most time-sensitive data (line movement) lives one tap away, not on the card itself.' },
  ];

  const v2Wins = [
    { n: 1, title: 'Fire badge dominates the card', desc: 'Two-line chip — direction arrow on top, FIRE 2u label below, color-coded by side (red = UNDER, navy = OVER). Left border echoes the tier.' },
    { n: 2, title: 'Daily digest hero', desc: '"5 fire picks today · avg EV +9.6%" gives an at-a-glance read before any scrolling.' },
    { n: 3, title: 'Projection visualized, not just tabulated', desc: 'A tiny bar plots line vs. λ-projection so you feel the edge, not just read it as 7.5 → 8.42.' },
    { n: 4, title: 'Why-pills surface the model', desc: 'OPP K% / K/9 / UMP each show value + delta + tone, so the "reasoning" is literally on the card.' },
    { n: 5, title: 'Week-at-a-glance date strip', desc: 'Swipe pills replace dropdown; past days show a win/loss dot so you can skim calibration in motion.' },
    { n: 6, title: 'Steam inline', desc: 'Steam ¢ sits in the why-row on every card; no tab switch needed.' },
  ];

  return (

      {/* ── Header ── */}
      <div style={{ padding: '20px 60px 0' }}>
        <div style={{
          fontSize: 11, fontFamily: 'JetBrains Mono, monospace',
          letterSpacing: '.1em', textTransform: 'uppercase',
          color: '#8a7e65', marginBottom: 6,
        }}>Design review · Apr 17, 2026</div>

          fontSize: 36, fontWeight: 600, letterSpacing: -0.8,
          color: '#1a1a1a', lineHeight: 1.1, marginBottom: 10,

          fontSize: 15, color: '#5a5448', maxWidth: 720, lineHeight: 1.5,

          <strong> explanation</strong> (why this side?), and a <strong>single visual voice</strong>.
          Below: the live app on the left, a concrete redesign on the right, with six specific changes.

        </DCArtboard>

        {/* Issue callouts column */}
        <div style={{ width: 300, paddingTop: 8, flexShrink: 0 }}>
          <div style={{
            fontFamily: 'Oswald, sans-serif', fontSize: 13, fontWeight: 600,
            letterSpacing: '.08em', textTransform: 'uppercase',
            color: '#8a7e65', marginBottom: 16,
          }}>What's working against you</div>
          {currentIssues.map((c, i) => (
            <div key={i} style={{ marginBottom: 16 }}>
              <Callout {...c} top={0} left={0} />
              <div style={{ height: 54 }}/>
            </div>
          ))}
        </div>

        <DCArtboard label="Proposed — v2 redesign" width={PHONE_W + 16} height={PHONE_H + 16}>
          <PhoneBezel src="v2/v2.html" />
        </DCArtboard>

        {/* Wins column */}
        <div style={{ width: 300, paddingTop: 8, flexShrink: 0 }}>
          <div style={{
            fontFamily: 'Oswald, sans-serif', fontSize: 13, fontWeight: 600,
            letterSpacing: '.08em', textTransform: 'uppercase',
            color: '#1e8549', marginBottom: 16,
          }}>What v2 changes</div>
          {v2Wins.map((c, i) => (
            <div key={i} style={{ marginBottom: 16 }}>
              <Callout {...c} top={0} left={0} color="#1e8549" />
              <div style={{ height: 54 }}/>
            </div>

        </div>

              </div>

                <div style={{ fontSize: 10, fontWeight: 700, color: '#c0392b', textTransform: 'uppercase', letterSpacing: '.07em' }}>Proj K</div>

            </div>

        </DCArtboard>

        <div style={{ width: 60, paddingTop: 80, flexShrink: 0, textAlign: 'center', color: '#8a7e65' }}>

        </div>

        <DCArtboard label="Proposed card" width={370} height={260} style={{ padding: 20, background: '#f6f5f2' }}>
          <div style={{
            background: '#fff', border: '1px solid #e4e0d6', borderRadius: 10,
            overflow: 'hidden', position: 'relative',
            boxShadow: '0 1px 3px rgba(0,0,0,0.04)',
          }}>
            <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: 4, background: '#c6321f' }}/>
            <div style={{ padding: '12px 14px 8px', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, fontWeight: 700, color: '#7a7366', letterSpacing: '.04em', display: 'flex', gap: 6, alignItems: 'center' }}>
                  <span>NYY</span><span style={{ opacity: 0.5, fontWeight: 400 }}>vs</span><span>LAA</span>
                  <span style={{ marginLeft: 'auto', display: 'inline-flex', gap: 5, alignItems: 'center' }}>
                    <span style={{ width: 7, height: 7, borderRadius: '50%', background: '#1e8549', display: 'inline-block' }}/>

                  Max Fried
                  <span style={{ fontSize: 11, color: '#7a7366', marginLeft: 6, fontFamily: 'JetBrains Mono, monospace' }}>RHP</span>
                </div>
              </div>
              <div style={{
                padding: '7px 10px 6px', borderRadius: 6,
                background: '#c6321f', color: '#fff',
                fontFamily: 'Oswald, sans-serif', textTransform: 'uppercase',
                display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
                minWidth: 82, lineHeight: 1, boxShadow: '0 0 0 3px rgba(198,50,31,0.15)',
              }}>

                <span style={{ fontSize: 14, fontWeight: 700 }}>FIRE 2U</span>

                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontWeight: 700, fontSize: 20, letterSpacing: '-0.02em' }}>6.5<span style={{ fontSize: 14, opacity: 0.5 }}> K</span></div>
                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10.5, color: '#7a7366', marginTop: 2 }}>-132 · FanDuel</div>
              </div>

                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10.5, color: '#7a7366', marginTop: 2 }}>p = 72.4%</div>

                <span style={{ opacity: 0.7, fontWeight: 500 }}>OPP K% </span>25.2%<span style={{ opacity: 0.7, fontWeight: 500 }}> +11%</span>
              </span>
              <span style={{ fontSize: 10.5, fontWeight: 600, fontFamily: 'JetBrains Mono, monospace', padding: '3px 7px', borderRadius: 4, background: '#fdecea', border: '1px solid #f5c6c6', color: '#c6321f' }}>
                <span style={{ opacity: 0.7, fontWeight: 500 }}>K/9 </span>5.68<span style={{ opacity: 0.7, fontWeight: 500 }}> -0.8 vs szn</span>
              </span>
              <span style={{ marginLeft: 'auto', fontSize: 10.5, fontFamily: 'JetBrains Mono, monospace', fontWeight: 700, color: '#1e8549', padding: '2px 6px', borderRadius: 4, background: 'rgba(30,133,73,0.1)' }}>
                ▲ steam 13¢
              </span>

          </div>
          <Pin n={1} top={50} left={325} color="#1e8549"/>

      >
        <DCArtboard label="Current — Performance tab" width={PHONE_W + 16} height={PHONE_H + 16}>
          <PhoneBezel
            src="current/index.html"
            initScript={(iframe) => {
              setTimeout(() => {
                try {

        <DCArtboard label="Proposed — Performance tab" width={PHONE_W + 16} height={PHONE_H + 16}>
          <PhoneBezel
            src="v2/v2.html"
            initScript={(iframe) => {
              setTimeout(() => {
                try {
                  const doc = iframe.contentDocument;

            fontFamily: 'Oswald, sans-serif', fontSize: 13, fontWeight: 600,
            letterSpacing: '.08em', textTransform: 'uppercase',

                width: 90, padding: '6px 10px', textAlign: 'center',
                background: c.bg, color: c.color || '#fff',
                border: c.border ? `1.5px solid ${c.border}` : 'none',
                borderRadius: 6, fontFamily: 'Oswald, sans-serif', fontWeight: 700,
                fontSize: 12, letterSpacing: '.04em', textTransform: 'uppercase',
              }}>{c.label}</div>
              <div style={{ flex: 1, fontSize: 12, color: '#5a5448', lineHeight: 1.4 }}>{c.desc}</div>
            </div>
          ))}
        </DCArtboard>

        <DCArtboard label="Density & rhythm" width={400} height={320} style={{ padding: 28, background: '#fff' }}>
          <div style={{ fontSize: 11, color: '#7a7366', fontFamily: 'Oswald, sans-serif', letterSpacing: '.08em', textTransform: 'uppercase', marginBottom: 14 }}>Spacing scale</div>
          {[
            ['4', 'Intra-row gaps (pills, icon gaps)'],
            ['8', 'Stat-row internal padding'],
            ['14', 'Card padding (was 10)'],
            ['18', 'Page gutter (was 16)'],
            ['10', 'Card-to-card vertical gap'],
          ].map(([px, label], i) => (
            <div key={i} style={{ display: 'flex', gap: 14, alignItems: 'center', marginBottom: 10 }}>
              <div style={{ width: 30, fontFamily: 'JetBrains Mono, monospace', fontWeight: 700, fontSize: 13, color: '#c6321f' }}>{px}px</div>
              <div style={{ flex: 1, height: 1, background: '#e4e0d6', position: 'relative' }}>
                <div style={{ position: 'absolute', left: 0, top: -5, width: parseInt(px), height: 10, background: '#c6321f', borderRadius: 1 }}/>
              </div>
              <div style={{ width: 200, fontSize: 12, color: '#5a5448' }}>{label}</div>
            </div>
          ))}
          <div style={{ marginTop: 16, paddingTop: 14, borderTop: '1px solid #e4e0d6', fontSize: 12, color: '#5a5448', lineHeight: 1.5 }}>
            Current dashboard cards are <strong>9px padded</strong> inside a cream bg — tight but visually busy.
            Moving to 14/18 with more whitespace + a single surface color (white on off-white) gives each card room to breathe.
          </div>
        </DCArtboard>
      </DCSection>

      {/* ── Section 5: next steps ── */}
      <DCSection
        title="5. If you want to ship just three things"
        subtitle="Ordered by impact-to-effort ratio."
      >
        <DCArtboard label="" width={1200} height={320} style={{ padding: 36, background: '#fff' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 36 }}>
            {[
              {
                n: 1,
                title: 'Promote the verdict',
                effort: 'Half-day',
                desc: 'Replace the small pill with the two-line FIRE badge + left border accent. Change nothing else. Biggest hierarchy win per line of code.',
                color: '#c6321f',
              },
              {
                n: 2,
                title: 'Add the why-pills row',
                effort: '1 day',
                desc: 'Surface OPP K%, K/9 delta, steam inline on every card. Makes the model feel transparent; reduces "why this pick?" questions.',
                color: '#1e3a5f',
              },
              {
                n: 3,
                title: 'Date-strip instead of dropdown',
                effort: '1 day',
                desc: 'Week-at-a-glance pills with win/loss dots. Dropdown → lateral swipe. Also exposes calibration trend in motion.',
                color: '#1e8549',
              },
            ].map(s => (
              <div key={s.n} style={{
                padding: 24, borderRadius: 10,
                border: `1px solid #e4e0d6`,
                borderTop: `4px solid ${s.color}`,
                background: '#fafaf7',
              }}>
                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: s.color, fontWeight: 700, marginBottom: 8 }}>STEP {s.n} · {s.effort}</div>
                <div style={{ fontFamily: 'Oswald, sans-serif', fontWeight: 600, fontSize: 22, marginBottom: 10, color: '#1a1a1a' }}>{s.title}</div>
                <div style={{ fontSize: 13, color: '#5a5448', lineHeight: 1.5 }}>{s.desc}</div>
              </div>
            ))}
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
