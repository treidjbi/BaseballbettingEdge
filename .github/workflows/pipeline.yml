name: Baseball Pipeline

on:
  schedule:
    # All times are America/Phoenix (UTC-7, no DST — crons never change).
    #
    # 12:17 AM Phoenix = 07:17 UTC  — preview run: fetch today's lines as opening baseline
    - cron: '17 7 * * *'
    # 3:17 AM Phoenix = 10:17 UTC  — grading run: grade previous day + calibrate
    - cron: '17 10 * * *'
    # 6:17 AM Phoenix = 13:17 UTC  — full run: finalize picks (uses preview lines as opening)
    - cron: '17 13 * * *'
    # Refresh + lock runs: fetch fresh odds/lineups, update unlocked picks, lock T-30min.
    # Runs every 30 minutes 8:07am–6:07pm Phoenix for tighter line tracking and lock windows.
    # 8:07 AM Phoenix = 15:07 UTC
    - cron: '7 15 * * *'
    # 8:37 AM Phoenix = 15:37 UTC
    - cron: '37 15 * * *'
    # 9:07 AM Phoenix = 16:07 UTC
    - cron: '7 16 * * *'
    # 9:37 AM Phoenix = 16:37 UTC
    - cron: '37 16 * * *'
    # 10:07 AM Phoenix = 17:07 UTC
    - cron: '7 17 * * *'
    # 10:37 AM Phoenix = 17:37 UTC
    - cron: '37 17 * * *'
    # 11:07 AM Phoenix = 18:07 UTC
    - cron: '7 18 * * *'
    # 11:37 AM Phoenix = 18:37 UTC
    - cron: '37 18 * * *'
    # 12:07 PM Phoenix = 19:07 UTC
    - cron: '7 19 * * *'
    # 12:37 PM Phoenix = 19:37 UTC
    - cron: '37 19 * * *'
    # 1:07 PM Phoenix = 20:07 UTC
    - cron: '7 20 * * *'
    # 1:37 PM Phoenix = 20:37 UTC
    - cron: '37 20 * * *'
    # 2:07 PM Phoenix = 21:07 UTC
    - cron: '7 21 * * *'
    # 2:37 PM Phoenix = 21:37 UTC
    - cron: '37 21 * * *'
    # 3:07 PM Phoenix = 22:07 UTC
    - cron: '7 22 * * *'
    # 3:37 PM Phoenix = 22:37 UTC
    - cron: '37 22 * * *'
    # 4:07 PM Phoenix = 23:07 UTC
    - cron: '7 23 * * *'
    # 4:37 PM Phoenix = 23:37 UTC
    - cron: '37 23 * * *'
    # 5:07 PM Phoenix = 00:07 UTC (next day)
    - cron: '7 0 * * *'
    # 5:37 PM Phoenix = 00:37 UTC (next day)
    - cron: '37 0 * * *'
    # 6:07 PM Phoenix = 01:07 UTC (next day)
    - cron: '7 1 * * *'
  workflow_dispatch:        # manual trigger for testing

permissions:
  contents: write           # allows the bot to commit + push output files

# Prevent two runs from writing picks_history.json simultaneously.
# cancel-in-progress: false queues the newer run instead of discarding it,
# so no scheduled run is silently dropped.
concurrency:
  group: pipeline-run
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        env:
          RUNDOWN_API_KEY: ${{ secrets.RUNDOWN_API_KEY }}
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          TODAY=$(TZ=America/Phoenix date +%Y-%m-%d)

          if [ "$SCHEDULE" = "17 7 * * *" ]; then
            # 12:17am Phoenix — preview: fetch today's lines as opening baseline
            # At midnight we've already rolled into the game day, so TODAY is correct
            python pipeline/run_pipeline.py $TODAY --run-type preview

          elif [ "$SCHEDULE" = "17 10 * * *" ]; then
            # 3:17am Phoenix — grading: grade previous day's picks + calibrate
            python pipeline/run_pipeline.py $TODAY --run-type grading

          elif [ "$SCHEDULE" = "7 15 * * *" ] || \
               [ "$SCHEDULE" = "37 15 * * *" ] || \
               [ "$SCHEDULE" = "7 16 * * *" ] || \
               [ "$SCHEDULE" = "37 16 * * *" ] || \
               [ "$SCHEDULE" = "7 17 * * *" ] || \
               [ "$SCHEDULE" = "37 17 * * *" ] || \
               [ "$SCHEDULE" = "7 18 * * *" ] || \
               [ "$SCHEDULE" = "37 18 * * *" ] || \
               [ "$SCHEDULE" = "7 19 * * *" ] || \
               [ "$SCHEDULE" = "37 19 * * *" ] || \
               [ "$SCHEDULE" = "7 20 * * *" ] || \
               [ "$SCHEDULE" = "37 20 * * *" ] || \
               [ "$SCHEDULE" = "7 21 * * *" ] || \
               [ "$SCHEDULE" = "37 21 * * *" ] || \
               [ "$SCHEDULE" = "7 22 * * *" ] || \
               [ "$SCHEDULE" = "37 22 * * *" ] || \
               [ "$SCHEDULE" = "7 23 * * *" ] || \
               [ "$SCHEDULE" = "37 23 * * *" ] || \
               [ "$SCHEDULE" = "7 0 * * *" ] || \
               [ "$SCHEDULE" = "37 0 * * *" ] || \
               [ "$SCHEDULE" = "7 1 * * *" ]; then
            # 8:07am–6:07pm Phoenix (every 30 min) — full refresh: fresh odds + lineups,
            # update unlocked picks with latest verdict/EV, then lock T-30min picks
            python pipeline/run_pipeline.py $TODAY

          else
            # 6am Phoenix — full: finalize today's picks (uses midnight preview lines as opening)
            python pipeline/run_pipeline.py $TODAY
          fi

      - name: Commit pipeline output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/processed/
          test -f dashboard/data/performance.json && git add dashboard/data/performance.json || true
          test -f data/picks_history.json        && git add data/picks_history.json        || true
          test -f data/params.json               && git add data/params.json               || true
          test -f data/preview_lines.json        && git add data/preview_lines.json        || true
          git add data/batter_splits_*.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: pipeline update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Retry push up to 4 times with exponential backoff (2 / 4 / 8 / 16 s).
          # The concurrency group above prevents overlapping runs, but a transient
          # network hiccup can still fail a push; retrying keeps picks_history.json
          # from going stale on the remote.
          for attempt in 1 2 3 4; do
            git pull --rebase && git push && break
            if [ "$attempt" = "4" ]; then
              echo "ERROR: git push failed after 4 attempts — picks_history.json may be stale on remote" >&2
              exit 1
            fi
            echo "Push attempt $attempt failed; retrying in $((2 ** attempt))s..."
            sleep $((2 ** attempt))
          done

      - name: Send push notifications
        if: success()
        env:
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
          NETLIFY_SITE_URL: ${{ secrets.NETLIFY_SITE_URL }}
        run: |
          # Skip if secrets not configured yet
          if [ -z "$NOTIFY_SECRET" ] || [ -z "$NETLIFY_SITE_URL" ]; then
            echo "Push notifications not configured — skipping (set NOTIFY_SECRET and NETLIFY_SITE_URL secrets to enable)"
            exit 0
          fi
          SCHEDULE="${{ github.event.schedule }}"
          if [ "$SCHEDULE" = "17 10 * * *" ]; then
            RUN_TYPE="grading"
          elif [ "$SCHEDULE" = "17 7 * * *" ]; then
            RUN_TYPE="preview"
          else
            RUN_TYPE="full"
          fi
          curl -sf -X POST \
            -H "x-notify-secret: $NOTIFY_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"runType\":\"$RUN_TYPE\"}" \
            "$NETLIFY_SITE_URL/.netlify/functions/send-notifications" \
            && echo "Notifications sent" \
            || echo "Notification call failed (non-fatal)"
