name: Baseball Pipeline

on:
  schedule:
    # All times are America/Phoenix (UTC-7, no DST — crons never change).
    #
    # 12:00 AM (midnight) Phoenix = 07:00 UTC  — preview run: fetch today's lines as opening baseline
    - cron: '0 7 * * *'
    # 3:00 AM Phoenix = 10:00 UTC  — grading run: grade previous day + calibrate
    - cron: '0 10 * * *'
    # 6:00 AM Phoenix = 13:00 UTC  — full run: finalize picks (treats 7pm lines as opening)
    - cron: '0 13 * * *'
    # Refresh + lock runs: fetch fresh odds/lineups, update unlocked picks, lock T-30min.
    # Runs every 30 minutes 8am–6pm Phoenix for tighter line tracking and lock windows.
    # 8:00 AM Phoenix = 15:00 UTC
    - cron: '0 15 * * *'
    # 8:30 AM Phoenix = 15:30 UTC
    - cron: '30 15 * * *'
    # 9:00 AM Phoenix = 16:00 UTC
    - cron: '0 16 * * *'
    # 9:30 AM Phoenix = 16:30 UTC
    - cron: '30 16 * * *'
    # 10:00 AM Phoenix = 17:00 UTC
    - cron: '0 17 * * *'
    # 10:30 AM Phoenix = 17:30 UTC
    - cron: '30 17 * * *'
    # 11:00 AM Phoenix = 18:00 UTC
    - cron: '0 18 * * *'
    # 11:30 AM Phoenix = 18:30 UTC
    - cron: '30 18 * * *'
    # 12:00 PM Phoenix = 19:00 UTC
    - cron: '0 19 * * *'
    # 12:30 PM Phoenix = 19:30 UTC
    - cron: '30 19 * * *'
    # 1:00 PM Phoenix = 20:00 UTC
    - cron: '0 20 * * *'
    # 1:30 PM Phoenix = 20:30 UTC
    - cron: '30 20 * * *'
    # 2:00 PM Phoenix = 21:00 UTC
    - cron: '0 21 * * *'
    # 2:30 PM Phoenix = 21:30 UTC
    - cron: '30 21 * * *'
    # 3:00 PM Phoenix = 22:00 UTC
    - cron: '0 22 * * *'
    # 3:30 PM Phoenix = 22:30 UTC
    - cron: '30 22 * * *'
    # 4:00 PM Phoenix = 23:00 UTC
    - cron: '0 23 * * *'
    # 4:30 PM Phoenix = 23:30 UTC
    - cron: '30 23 * * *'
    # 5:00 PM Phoenix = 00:00 UTC (next day)
    - cron: '0 0 * * *'
    # 5:30 PM Phoenix = 00:30 UTC (next day)
    - cron: '30 0 * * *'
    # 6:00 PM Phoenix = 01:00 UTC (next day)
    - cron: '0 1 * * *'
  workflow_dispatch:        # manual trigger for testing

permissions:
  contents: write           # allows the bot to commit + push output files

# Prevent two runs from writing picks_history.json simultaneously.
# cancel-in-progress: false queues the newer run instead of discarding it,
# so no scheduled run is silently dropped.
concurrency:
  group: pipeline-run
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        env:
          RUNDOWN_API_KEY: ${{ secrets.RUNDOWN_API_KEY }}
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          TODAY=$(TZ=America/Phoenix date +%Y-%m-%d)

          if [ "$SCHEDULE" = "0 7 * * *" ]; then
            # midnight Phoenix — preview: fetch today's lines as opening baseline
            # At midnight we've already rolled into the game day, so TODAY is correct
            python pipeline/run_pipeline.py $TODAY --run-type preview

          elif [ "$SCHEDULE" = "0 10 * * *" ]; then
            # 3am Phoenix — grading: grade previous day's picks + calibrate
            python pipeline/run_pipeline.py $TODAY --run-type grading

          elif [ "$SCHEDULE" = "0 15 * * *" ] || \
               [ "$SCHEDULE" = "30 15 * * *" ] || \
               [ "$SCHEDULE" = "0 16 * * *" ] || \
               [ "$SCHEDULE" = "30 16 * * *" ] || \
               [ "$SCHEDULE" = "0 17 * * *" ] || \
               [ "$SCHEDULE" = "30 17 * * *" ] || \
               [ "$SCHEDULE" = "0 18 * * *" ] || \
               [ "$SCHEDULE" = "30 18 * * *" ] || \
               [ "$SCHEDULE" = "0 19 * * *" ] || \
               [ "$SCHEDULE" = "30 19 * * *" ] || \
               [ "$SCHEDULE" = "0 20 * * *" ] || \
               [ "$SCHEDULE" = "30 20 * * *" ] || \
               [ "$SCHEDULE" = "0 21 * * *" ] || \
               [ "$SCHEDULE" = "30 21 * * *" ] || \
               [ "$SCHEDULE" = "0 22 * * *" ] || \
               [ "$SCHEDULE" = "30 22 * * *" ] || \
               [ "$SCHEDULE" = "0 23 * * *" ] || \
               [ "$SCHEDULE" = "30 23 * * *" ] || \
               [ "$SCHEDULE" = "0 0 * * *" ] || \
               [ "$SCHEDULE" = "30 0 * * *" ] || \
               [ "$SCHEDULE" = "0 1 * * *" ]; then
            # 8am–6pm Phoenix (every 30 min) — full refresh: fresh odds + lineups,
            # update unlocked picks with latest verdict/EV, then lock T-30min picks
            python pipeline/run_pipeline.py $TODAY

          else
            # 6am Phoenix — full: finalize today's picks (uses midnight preview lines as opening)
            python pipeline/run_pipeline.py $TODAY
          fi

      - name: Commit pipeline output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/processed/
          test -f dashboard/data/performance.json && git add dashboard/data/performance.json || true
          test -f data/picks_history.json        && git add data/picks_history.json        || true
          test -f data/params.json               && git add data/params.json               || true
          test -f data/preview_lines.json        && git add data/preview_lines.json        || true
          git diff --staged --quiet || git commit -m "chore: pipeline update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Retry push up to 4 times with exponential backoff (2 / 4 / 8 / 16 s).
          # The concurrency group above prevents overlapping runs, but a transient
          # network hiccup can still fail a push; retrying keeps picks_history.json
          # from going stale on the remote.
          for attempt in 1 2 3 4; do
            git pull --rebase && git push && break
            if [ "$attempt" = "4" ]; then
              echo "ERROR: git push failed after 4 attempts — picks_history.json may be stale on remote" >&2
              exit 1
            fi
            echo "Push attempt $attempt failed; retrying in $((2 ** attempt))s..."
            sleep $((2 ** attempt))
          done

      - name: Send push notifications
        if: success()
        env:
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
          NETLIFY_SITE_URL: ${{ secrets.NETLIFY_SITE_URL }}
        run: |
          # Skip if secrets not configured yet
          if [ -z "$NOTIFY_SECRET" ] || [ -z "$NETLIFY_SITE_URL" ]; then
            echo "Push notifications not configured — skipping (set NOTIFY_SECRET and NETLIFY_SITE_URL secrets to enable)"
            exit 0
          fi
          SCHEDULE="${{ github.event.schedule }}"
          if [ "$SCHEDULE" = "0 10 * * *" ]; then
            RUN_TYPE="grading"
          elif [ "$SCHEDULE" = "0 7 * * *" ]; then
            RUN_TYPE="preview"
          else
            RUN_TYPE="full"
          fi
          curl -sf -X POST \
            -H "x-notify-secret: $NOTIFY_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"runType\":\"$RUN_TYPE\"}" \
            "$NETLIFY_SITE_URL/.netlify/functions/send-notifications" \
            && echo "Notifications sent" \
            || echo "Notification call failed (non-fatal)"
